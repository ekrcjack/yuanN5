<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>N5 單字卡</title>
<style>
  :root{
    --paper:#EDEAE2;
    --paper-2:#F6F4EE;
    --ink:#1E2A44;
    --muted:#7C7566;
    --line:#D8D2C4;
    --accent:#2E4A7D;          /* current category accent, set via JS */
    --accent-soft:#2E4A7D18;
    --shadow:0 18px 40px -18px rgba(30,42,68,.45);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(120% 90% at 50% -10%, var(--paper-2), var(--paper) 60%);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif;
    min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;
    padding:clamp(16px,3vw,32px);
    transition:--accent .3s;
  }
  .mincho{font-family:"Hiragino Mincho ProN","Yu Mincho",YuMincho,"Songti TC","Noto Serif TC",serif;}

  /* ---------- header ---------- */
  header{
    width:100%;max-width:640px;
    display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;
    padding-bottom:14px;border-bottom:1px solid var(--line);
  }
  .brand{line-height:1.15;flex:1 1 auto;}
  .brand .kana{font-size:12px;letter-spacing:.28em;color:var(--muted);text-transform:none;}
  .brand h1{font-size:clamp(18px,4.5vw,22px);font-weight:700;letter-spacing:.02em;margin-top:2px;}
  .brand .accent-dot{color:var(--accent);}

  .tabs{display:flex;gap:6px;flex:0 0 auto;}
  .tab{
    appearance:none;border:1px solid var(--line);background:var(--paper-2);
    color:var(--muted);font:inherit;font-size:14px;font-weight:600;
    padding:8px 13px;border-radius:11px 11px 4px 4px;cursor:pointer;
    transition:.18s;position:relative;top:1px;
  }
  .tab:hover{color:var(--ink);border-color:var(--muted);}
  .tab[aria-selected="true"]{
    background:var(--accent);border-color:var(--accent);color:#fff;top:0;
    box-shadow:0 6px 16px -8px var(--accent);
  }
  .tab:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

  /* ---------- meta line ---------- */
  .meta{
    width:100%;max-width:640px;margin-top:18px;
    display:flex;align-items:center;justify-content:space-between;
    font-size:13px;color:var(--muted);letter-spacing:.03em;
  }
  .meta .set{display:flex;align-items:center;gap:8px;font-weight:600;color:var(--ink);}
  .meta .set::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--accent);}
  .meta .count{font-variant-numeric:tabular-nums;}
  .meta .count b{color:var(--ink);font-size:15px;}

  /* progress bar */
  .bar{width:100%;max-width:640px;height:3px;background:var(--line);border-radius:2px;margin-top:8px;overflow:hidden;}
  .bar > i{display:block;height:100%;background:var(--accent);border-radius:2px;transition:width .25s;}

  /* ---------- card ---------- */
  .stage{
    width:100%;max-width:640px;flex:1;display:flex;align-items:center;justify-content:center;
    perspective:1600px;padding:22px 0;min-height:0;
  }
  .card{
    position:relative;width:100%;height:clamp(380px,60vh,470px);
    cursor:pointer;transform-style:preserve-3d;
    transition:transform .5s cubic-bezier(.2,.7,.2,1);
    border-radius:22px;
  }
  .card.flipped{transform:rotateY(180deg);}
  .card:focus-visible{outline:none;}
  .card:focus-visible .face{outline:2.5px solid var(--accent);outline-offset:3px;}
  .face{
    position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border-radius:22px;background:var(--paper-2);border:1px solid var(--line);
    box-shadow:var(--shadow);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;overflow:hidden;
  }
  .face::before{ /* accent spine on top */
    content:"";position:absolute;top:0;left:0;right:0;height:5px;background:var(--accent);
  }
  .corner{position:absolute;top:14px;right:16px;font-size:12px;color:var(--muted);letter-spacing:.15em;}
  .front .word{font-size:clamp(44px,13vw,84px);font-weight:600;line-height:1;letter-spacing:.02em;}
  .front .hint{margin-top:22px;font-size:13px;color:var(--muted);letter-spacing:.1em;}
  .speak{
    margin-top:26px;appearance:none;cursor:pointer;
    width:52px;height:52px;border-radius:50%;
    border:1.5px solid var(--accent);background:var(--accent-soft);color:var(--accent);
    display:inline-flex;align-items:center;justify-content:center;transition:.15s;
  }
  .speak:hover{background:var(--accent);color:#fff;}
  .speak:active{transform:scale(.92);}
  .speak.playing{background:var(--accent);color:#fff;animation:pulse .8s ease-in-out infinite;}
  .speak svg{width:23px;height:23px;stroke-width:2;}
  .speak:focus-visible{outline:2px solid var(--accent);outline-offset:3px;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--accent-soft);}50%{box-shadow:0 0 0 8px transparent;}}

  .back{transform:rotateY(180deg);align-items:stretch;justify-content:normal;overflow-y:auto;padding:0;}
  .back-inner{margin:auto;width:100%;display:flex;flex-direction:column;align-items:center;gap:5px;padding:30px 22px;}
  .back .kana{font-size:clamp(26px,7vw,40px);font-weight:600;color:var(--accent);line-height:1.1;}
  .back .romaji{font-size:14px;color:var(--muted);letter-spacing:.12em;font-style:italic;margin-top:2px;}
  .back .zh{font-size:clamp(19px,5vw,24px);font-weight:600;margin-top:10px;}
  .tag{
    display:inline-block;font-size:11px;letter-spacing:.1em;color:var(--accent);
    border:1px solid var(--accent);border-radius:20px;padding:1px 10px;margin-bottom:6px;
  }
  .back .ant{
    margin-top:14px;padding-top:12px;border-top:1px dashed var(--line);
    width:min(100%,380px);text-align:center;font-size:13.5px;color:var(--muted);line-height:1.5;
  }
  .back .ant .aw{color:var(--ink);font-weight:600;}
  .back .ex{
    margin-top:14px;padding-top:12px;border-top:1px dashed var(--line);
    width:min(100%,400px);text-align:center;
  }
  .back .ex .ex-head{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:6px;}
  .back .ex .ex-head .tag{margin-bottom:0;}
  .speak-sm{
    appearance:none;cursor:pointer;width:28px;height:28px;border-radius:50%;flex-shrink:0;
    border:1.5px solid var(--accent);background:var(--accent-soft);color:var(--accent);
    display:inline-flex;align-items:center;justify-content:center;transition:.15s;padding:0;
  }
  .speak-sm svg{width:14px;height:14px;stroke-width:2;}
  .speak-sm:hover{background:var(--accent);color:#fff;}
  .speak-sm:active{transform:scale(.9);}
  .speak-sm.playing{background:var(--accent);color:#fff;}
  .speak-sm:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .back .ex .ex-jp{font-size:clamp(16px,4.4vw,19px);color:var(--ink);line-height:1.5;}
  .back .ex .ex-romaji{font-size:12.5px;color:var(--muted);font-style:italic;letter-spacing:.03em;margin-top:3px;line-height:1.4;}
  .back .ex .ex-zh{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.45;}
  .hide-romaji .romaji{visibility:hidden;}

  /* ---------- controls ---------- */
  .controls{width:100%;max-width:640px;display:flex;align-items:center;justify-content:center;gap:10px;}
  .btn{
    appearance:none;font:inherit;font-weight:600;cursor:pointer;
    border:1px solid var(--line);background:var(--paper-2);color:var(--ink);
    border-radius:13px;padding:12px 18px;transition:.16s;font-size:15px;
    display:inline-flex;align-items:center;gap:7px;
  }
  .btn:hover{border-color:var(--accent);color:var(--accent);}
  .btn:active{transform:translateY(1px);}
  .btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .btn.nav{flex:1;justify-content:center;}
  .btn.round{padding:12px 14px;}
  svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

  .footbar{width:100%;max-width:640px;margin-top:12px;display:flex;justify-content:center;}
  .toggle{
    display:inline-flex;align-items:center;gap:9px;font-size:13px;color:var(--muted);
    cursor:pointer;user-select:none;padding:7px 4px;
  }
  .switch{width:38px;height:22px;border-radius:20px;background:var(--line);position:relative;transition:.2s;flex-shrink:0;}
  .switch::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:.2s;}
  .toggle input{position:absolute;opacity:0;}
  .toggle input:checked + .switch{background:var(--accent);}
  .toggle input:checked + .switch::after{transform:translateX(16px);}
  .toggle input:focus-visible + .switch{outline:2px solid var(--accent);outline-offset:2px;}

  @media (prefers-reduced-motion: reduce){
    .card{transition:none;}
  }
  @media (max-width:520px){
    .tabs{width:100%;justify-content:space-between;margin-top:10px;}
    .tab{flex:1;text-align:center;padding:9px 6px;}
  }
  @media (max-width:420px){
    .brand h1{max-width:70vw;}
    .tab{padding:8px 4px;font-size:13px;}
  }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="kana">エヌゴ　たんごカード</div>
      <h1>N5 單字卡<span class="accent-dot">°</span></h1>
    </div>
    <div class="tabs" role="tablist" aria-label="單字分類">
      <button class="tab" role="tab" data-deck="v1" aria-selected="true">動1</button>
      <button class="tab" role="tab" data-deck="v2" aria-selected="false">動2</button>
      <button class="tab" role="tab" data-deck="v3" aria-selected="false">動3</button>
      <button class="tab" role="tab" data-deck="adj" aria-selected="false">形容詞</button>
    </div>
  </header>

  <div class="meta">
    <span class="set" id="setTitle">動詞・第一類</span>
    <span class="count"><b id="cur">1</b> / <span id="total">37</span></span>
  </div>
  <div class="bar"><i id="prog"></i></div>

  <div class="stage">
    <div class="card" id="card" tabindex="0" role="button" aria-label="單字卡，點擊翻面">
      <div class="face front">
        <span class="corner" id="cornerF"></span>
        <div class="word mincho" id="fWord">飲む</div>
        <button class="speak" id="speak" aria-label="播放發音" title="播放發音（S）">
          <svg viewBox="0 0 24 24"><path d="M11 5 6 9H3v6h3l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/></svg>
        </button>
        <div class="hint">點一下翻面 · Space</div>
      </div>
      <div class="face back">
        <span class="corner">意味</span>
        <div class="back-inner">
          <div class="kana mincho" id="bKana">のむ</div>
          <div class="romaji" id="bRomaji">nomu</div>
          <div class="zh" id="bZh">喝</div>
          <div class="ant" id="bAnt" hidden></div>
          <div class="ex" id="bEx" hidden>
            <div class="ex-head">
              <span class="tag">例文</span>
              <button class="speak-sm" id="speakEx" aria-label="播放例句" title="播放例句">
                <svg viewBox="0 0 24 24"><path d="M11 5 6 9H3v6h3l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/></svg>
              </button>
            </div>
            <div class="ex-jp mincho" id="bExJp"></div>
            <div class="ex-romaji romaji" id="bExRo"></div>
            <div class="ex-zh" id="bExZh"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn round" id="prev" aria-label="上一張"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
    <button class="btn nav" id="flip"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>翻面</button>
    <button class="btn round" id="shuffle" aria-label="洗牌"><svg viewBox="0 0 24 24"><path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="m15 15 6 6"/><path d="M4 4l5 5"/></svg></button>
    <button class="btn round" id="next" aria-label="下一張"><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></button>
  </div>

  <div class="footbar">
    <label class="toggle">
      <input type="checkbox" id="romajiToggle" checked>
      <span class="switch"></span>顯示羅馬拼音
    </label>
  </div>

<script>

, "kana": "しんせつ", "romaji": "shinsetsu", "zh": "親切"}, "ex": "彼は真面目な学生です。", "exzh": "他是認真的學生。", "exromaji": "kare wa majime na gakusei desu."}, {"jp": "眠い", "kana": "ねむい", "romaji": "nemui", "zh": "睏", "ant": {"jp": "正しい", "kana": "ただしい", "romaji": "tadashii", "zh": "正確"}, "ex": "今とても眠いです。", "exzh": "現在很睏。", "exromaji": "ima totemo nemui desu."}, {"jp": "元気", "kana": "げんき", "romaji": "genki", "zh": "有精神、健康", "ex": "祖母は元気です。", "exzh": "奶奶很健康。", "exromaji": "sobo wa genki desu."}]}};
const ACCENTS = { v1:"#2E4A7D", v2:"#2F7060", v3:"#8A5A2B", adj:"#9E3B4E" };

const $ = id => document.getElementById(id);
const els = {
  card:$("card"), fWord:$("fWord"), cornerF:$("cornerF"),
  bKana:$("bKana"), bRomaji:$("bRomaji"), bZh:$("bZh"), bAnt:$("bAnt"),
  bEx:$("bEx"), bExJp:$("bExJp"), bExRo:$("bExRo"), bExZh:$("bExZh"),
  setTitle:$("setTitle"), cur:$("cur"), total:$("total"), prog:$("prog"),
};

let deckKey = "v1";
let order = [];
let pos = 0;
let curCard = null;

/* ---- 語音 (Web Speech API) ---- */
let jaVoice = null;
function pickVoice(){
  if(!('speechSynthesis' in window)) return;
  const vs = window.speechSynthesis.getVoices();
  jaVoice = vs.find(v => /ja(-|_)?/i.test(v.lang)) ||
            vs.find(v => /japanese/i.test(v.name)) || null;
}
if('speechSynthesis' in window){
  pickVoice();
  window.speechSynthesis.onvoiceschanged = pickVoice;
} else {
  // no support: hide the speaker buttons
  document.addEventListener("DOMContentLoaded", ()=>{
    ["speak","speakEx"].forEach(id=>{const b=$(id); if(b) b.style.display="none";});
  });
}
function speak(text, btn){
  if(!('speechSynthesis' in window) || !text) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "ja-JP"; u.rate = 0.9;
  if(!jaVoice) pickVoice();
  if(jaVoice) u.voice = jaVoice;
  if(btn){
    u.onstart = ()=> btn.classList.add("playing");
    u.onend = u.onerror = ()=> btn.classList.remove("playing");
  }
  window.speechSynthesis.speak(u);
}
function speakWord(){ if(curCard) speak(curCard.kana || curCard.jp, $("speak")); }
function speakEx(){ if(curCard && curCard.ex) speak(curCard.ex, $("speakEx")); }

function buildOrder(n, shuffle){
  order = [...Array(n).keys()];
  if(shuffle){
    for(let i=order.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [order[i],order[j]]=[order[j],order[i]];
    }
  }
}

function setDeck(key, {shuffle=false}={}){
  deckKey = key;
  document.documentElement.style.setProperty("--accent", ACCENTS[key]);
  document.documentElement.style.setProperty("--accent-soft", ACCENTS[key]+"18");
  document.querySelectorAll(".tab").forEach(t=>
    t.setAttribute("aria-selected", String(t.dataset.deck===key)));
  els.setTitle.textContent = DECK[key].title;
  buildOrder(DECK[key].cards.length, shuffle);
  pos = 0;
  render();
}

function render(){
  const d = DECK[deckKey];
  const c = d.cards[order[pos]];
  curCard = c;
  els.card.classList.remove("flipped");
  // small delay so the flip-back isn't visible while text swaps
  requestAnimationFrame(()=>{
    els.fWord.textContent = c.jp;
    els.bKana.textContent = c.kana;
    els.bRomaji.textContent = c.romaji;
    els.bZh.textContent = c.zh;
    els.cornerF.textContent = d.label;
    if(c.ant){
      els.bAnt.hidden = false;
      els.bAnt.innerHTML =
        `<span class="tag">反義詞</span><br>`+
        `<span class="aw">${c.ant.jp}</span>（${c.ant.kana}` +
        (c.ant.romaji? ` · <i>${c.ant.romaji}</i>`:``) + `）　${c.ant.zh}`;
    } else {
      els.bAnt.hidden = true;
      els.bAnt.innerHTML = "";
    }
    if(c.ex){
      els.bEx.hidden = false;
      els.bExJp.textContent = c.ex;
      els.bExRo.textContent = c.exromaji || "";
      els.bExZh.textContent = c.exzh || "";
    } else {
      els.bEx.hidden = true;
    }
  });
  els.cur.textContent = pos+1;
  els.total.textContent = d.cards.length;
  els.prog.style.width = ((pos+1)/d.cards.length*100)+"%";
}

function flip(){ els.card.classList.toggle("flipped"); }
function go(step){
  const n = DECK[deckKey].cards.length;
  pos = (pos + step + n) % n;
  render();
}

/* events */
document.querySelectorAll(".tab").forEach(t=>
  t.addEventListener("click", ()=>setDeck(t.dataset.deck)));
els.card.addEventListener("click", flip);
$("speak").addEventListener("click", e=>{ e.stopPropagation(); speakWord(); });
$("speakEx").addEventListener("click", e=>{ e.stopPropagation(); speakEx(); });
$("flip").addEventListener("click", flip);
$("prev").addEventListener("click", ()=>go(-1));
$("next").addEventListener("click", ()=>go(1));
$("shuffle").addEventListener("click", ()=>setDeck(deckKey,{shuffle:true}));
$("romajiToggle").addEventListener("change", e=>
  document.body.classList.toggle("hide-romaji", !e.target.checked));

document.addEventListener("keydown", e=>{
  if(e.target.matches("input")) return;
  if(e.code==="Space"||e.code==="Enter"){ e.preventDefault(); flip(); }
  else if(e.code==="ArrowRight") go(1);
  else if(e.code==="ArrowLeft") go(-1);
  else if(e.key==="s"||e.key==="S") speakWord();
});

setDeck("v1");
</script>
